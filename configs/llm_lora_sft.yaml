model:
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  backend: transformers_peft_lora
data:
  train_jsonl: data/processed/safety_sft_train.jsonl
output:
  output_dir: outputs/checkpoints/llm_safety_lora
training:
  max_length: 1024
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_train_epochs: 3
  bf16: true
  use_4bit: false
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
a100_script:
  command: MODEL_NAME_OR_PATH=Qwen/Qwen2.5-7B-Instruct GPU_IDS=0 scripts/training/run_a100_lora_sft.sh
